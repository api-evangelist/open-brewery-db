optimizationRecommendations:
  - recommendation: Use bulk dataset downloads for high-volume workloads
    rationale: >-
      Downloading the full dataset in CSV, JSON, or SQL format from GitHub and importing into
      a local or managed database eliminates API dependency for read-heavy production workloads
      and reduces load on the community-operated infrastructure.
  - recommendation: Cache API responses locally
    rationale: >-
      Brewery data changes infrequently (community contributions via pull requests). Caching
      responses for 24 hours or more is appropriate and reduces unnecessary repeat requests.
  - recommendation: Use the metadata endpoint before paginating
    rationale: >-
      The /v1/breweries/meta endpoint returns total record counts for a given filter set.
      Use it to determine pagination depth before issuing paginated list requests.
  - recommendation: Self-host for production SLA requirements
    rationale: >-
      The API is MIT-licensed. Organizations requiring guaranteed uptime should deploy a
      self-hosted instance using the freely available dataset and open-source application code.
