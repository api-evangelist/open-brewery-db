naftiko: 1.0.0-alpha2
info:
  label: Open Brewery DB — Random
  description: 'Open Brewery DB — Random. 1 operations. Lead operation: Open Brewery DB Random Brewery. Self-contained Naftiko
    capability covering one Open Brewery Db business surface.'
  tags:
  - Open Brewery Db
  - Random
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_BREWERY_DB_API_KEY: OPEN_BREWERY_DB_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-brewery-db-random
    baseUri: https://api.openbrewerydb.org/v1
    description: Open Brewery DB — Random business capability. Self-contained, no shared references.
    resources:
    - name: breweries-random
      path: /breweries/random
      operations:
      - name: get
        method: GET
        description: Open Brewery DB Random Brewery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: size
          in: query
          type: integer
          description: Number of breweries to return (default 1, max 50).
  exposes:
  - type: rest
    namespace: open-brewery-db-random-rest
    port: 8080
    description: REST adapter for Open Brewery DB — Random. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/breweries/random
      name: breweries-random
      description: REST surface for breweries-random.
      operations:
      - method: GET
        name: get
        description: Open Brewery DB Random Brewery
        call: open-brewery-db-random.get
        with:
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-brewery-db-random-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Brewery DB — Random. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: open-brewery-db-random-brewery
      description: Open Brewery DB Random Brewery
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-brewery-db-random.get
      with:
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
