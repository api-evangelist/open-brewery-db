naftiko: 1.0.0-alpha2
info:
  label: Open Brewery DB — Obdb
  description: 'Open Brewery DB — Obdb. 1 operations. Lead operation: Open Brewery DB Single Brewery. Self-contained Naftiko
    capability covering one Open Brewery Db business surface.'
  tags:
  - Open Brewery Db
  - Obdb
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_BREWERY_DB_API_KEY: OPEN_BREWERY_DB_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-brewery-db-obdb
    baseUri: https://api.openbrewerydb.org/v1
    description: Open Brewery DB — Obdb business capability. Self-contained, no shared references.
    resources:
    - name: breweries-obdb-id
      path: /breweries/{obdb-id}
      operations:
      - name: get
        method: GET
        description: Open Brewery DB Single Brewery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: obdb-id
          in: path
          type: string
          description: The ID of the brewery.
          required: true
  exposes:
  - type: rest
    namespace: open-brewery-db-obdb-rest
    port: 8080
    description: REST adapter for Open Brewery DB — Obdb. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/breweries/{obdb-id}
      name: breweries-obdb-id
      description: REST surface for breweries-obdb-id.
      operations:
      - method: GET
        name: get
        description: Open Brewery DB Single Brewery
        call: open-brewery-db-obdb.get
        with:
          obdb-id: rest.obdb-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-brewery-db-obdb-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Brewery DB — Obdb. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: open-brewery-db-single-brewery
      description: Open Brewery DB Single Brewery
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-brewery-db-obdb.get
      with:
        obdb-id: tools.obdb-id
      outputParameters:
      - type: object
        mapping: $.
