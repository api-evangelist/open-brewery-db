description: >-
  Open Brewery DB is a free and open-source REST API providing public information on breweries, cideries,
  brewpubs, and bottleshops worldwide. The database contains 11,000+ entries across 23+ countries and
  212+ states and regions. No API key, authentication, or registration is required. Data includes brewery
  name, type, address, city, state, country, coordinates, phone, and website. The API processes over
  720,000 requests per week and bulk dataset downloads are available in CSV, JSON, and SQL formats.
