specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Open Brewery DB
providerId: open-brewery-db
created: '2026-06-13'
modified: '2026-06-13'
tags:
  - Beer
  - Bottle Shops
  - Brew Pubs
  - Breweries
  - Cider
description: >-
  Open Brewery DB has a single free plan with no paid tiers, no subscription options, and no API keys
  required. The project is community-supported and committed to remaining permanently free and open-source.
  No registration or authentication is needed to access any endpoint.
plans:
  - id: open-brewery-db-free
    name: Free
    type: free
    description: >-
      Full access to all Open Brewery DB API endpoints at no cost. No API key, authentication, or
      registration required. The API is free for personal projects, student work, and web integrations.
      Production commercial use is at the consumer's own risk as no SLA is provided.
    entries:
      - label: API Requests
        description: No documented quota. The API is free with no published request limits.
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: No documented rate limit. The provider states the API has no rate limits.
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: -1
        timeFrame: minute
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All Endpoints (List, Search, Single, Random, Meta)
      - name: Public Documentation
      - name: Community Support (Discord)
      - name: Bulk Dataset Downloads (CSV, JSON, SQL)
      - name: Open Brewery DB
notes: >-
  Open Brewery DB is operated as a community-driven open-source project under the MIT license.
  Infrastructure is supported by Cloudflare. The project explicitly states the dataset and API
  will always remain free. For production commercial applications requiring SLA guarantees,
  self-hosting using the bulk dataset downloads is recommended.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
