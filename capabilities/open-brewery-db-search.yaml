naftiko: 1.0.0-alpha2
info:
  label: Open Brewery DB — Search
  description: 'Open Brewery DB — Search. 1 operations. Lead operation: Open Brewery DB Search Breweries. Self-contained Naftiko
    capability covering one Open Brewery Db business surface.'
  tags:
  - Open Brewery Db
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_BREWERY_DB_API_KEY: OPEN_BREWERY_DB_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-brewery-db-search
    baseUri: https://api.openbrewerydb.org/v1
    description: Open Brewery DB — Search business capability. Self-contained, no shared references.
    resources:
    - name: breweries-search
      path: /breweries/search
      operations:
      - name: get
        method: GET
        description: Open Brewery DB Search Breweries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Search term.
  exposes:
  - type: rest
    namespace: open-brewery-db-search-rest
    port: 8080
    description: REST adapter for Open Brewery DB — Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/breweries/search
      name: breweries-search
      description: REST surface for breweries-search.
      operations:
      - method: GET
        name: get
        description: Open Brewery DB Search Breweries
        call: open-brewery-db-search.get
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-brewery-db-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Brewery DB — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: open-brewery-db-search-breweries
      description: Open Brewery DB Search Breweries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-brewery-db-search.get
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
