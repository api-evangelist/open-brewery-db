description: >-
  Open Brewery DB has zero direct cost to API consumers. There are no usage fees, subscription charges,
  or metered billing. The API is free and open-source, community-supported, and infrastructure is provided
  by Cloudflare. FinOps considerations relate solely to self-hosting scenarios or the consumer's own
  infrastructure costs when building applications on top of the API.
costModel:
  type: free
  currency: USD
  baseCost: 0.00
  variableCost: 0.00
  apiCallCost: 0.00
  notes: >-
    No cost is incurred by API consumers. The project is permanently committed to being free
    and open-source. All endpoints, bulk downloads, and dataset access are free of charge.
principles:
  - name: Visibility
    description: >-
      Track API consumption patterns in your own application to understand usage and plan for
      potential self-hosting needs as volume grows.
  - name: Optimization
    description: >-
      Implement local caching of API responses (data changes infrequently via community PRs)
      and prefer bulk dataset downloads for high-volume read operations.
  - name: Accountability
    description: >-
      While there is no direct cost, consuming teams should account for indirect infrastructure
      costs (bandwidth, compute) when building production applications on the API.
