naftiko: 1.0.0-alpha2
info:
  label: Open Brewery DB — Meta
  description: 'Open Brewery DB — Meta. 1 operations. Lead operation: Open Brewery DB Metadata. Self-contained Naftiko capability
    covering one Open Brewery Db business surface.'
  tags:
  - Open Brewery Db
  - Meta
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_BREWERY_DB_API_KEY: OPEN_BREWERY_DB_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-brewery-db-meta
    baseUri: https://api.openbrewerydb.org/v1
    description: Open Brewery DB — Meta business capability. Self-contained, no shared references.
    resources:
    - name: breweries-meta
      path: /breweries/meta
      operations:
      - name: get
        method: GET
        description: Open Brewery DB Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: by_city
          in: query
          type: string
        - name: by_state
          in: query
          type: string
  exposes:
  - type: rest
    namespace: open-brewery-db-meta-rest
    port: 8080
    description: REST adapter for Open Brewery DB — Meta. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/breweries/meta
      name: breweries-meta
      description: REST surface for breweries-meta.
      operations:
      - method: GET
        name: get
        description: Open Brewery DB Metadata
        call: open-brewery-db-meta.get
        with:
          by_city: rest.by_city
          by_state: rest.by_state
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-brewery-db-meta-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Brewery DB — Meta. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: open-brewery-db-metadata
      description: Open Brewery DB Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-brewery-db-meta.get
      with:
        by_city: tools.by_city
        by_state: tools.by_state
      outputParameters:
      - type: object
        mapping: $.
