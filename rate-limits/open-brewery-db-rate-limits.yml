specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Open Brewery DB
providerId: open-brewery-db
created: '2026-06-13'
modified: '2026-06-13'
tags:
  - Beer
  - Bottle Shops
  - Brew Pubs
  - Breweries
  - Cider
  - Rate Limiting
description: >-
  Open Brewery DB does not impose documented rate limits. The provider explicitly states the API
  has no rate limits, making it suitable for web apps, student projects, and live integrations.
  The service processes approximately 720,000 API requests per week across all consumers.
rateLimitsPublished: false
rateLimitsNotes: >-
  The Open Brewery DB API has no published rate limits. The FAQ and documentation explicitly state
  there are no rate limits. The project is community-supported with no SLA. For high-volume or
  production workloads, bulk dataset downloads in CSV, JSON, and SQL are recommended as an alternative
  to repeated API calls.
headers:
  limit: null
  remaining: null
  reset: null
  retryAfter: null
  policy: null
responseCodes:
  throttled: null
  quotaExceeded: null
  serviceUnavailable: 503
limits: []
endpointConstraints:
  - endpoint: /v1/breweries
    parameter: per_page
    default: 50
    max: 200
    description: Maximum results per page when listing breweries
  - endpoint: /v1/breweries/random
    parameter: size
    default: 1
    max: 50
    description: Maximum number of random breweries returned in a single request
policies:
  - name: No Published Rate Limits
    description: >-
      The API provider explicitly states there are no rate limits. Consumers should still implement
      reasonable request cadence and caching to be good citizens of the community-operated service.
  - name: Responsible Use
    description: >-
      The maintainers recommend using the API for personal projects and caution that no SLA is
      provided. High-volume commercial workloads should use the bulk dataset downloads instead.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
