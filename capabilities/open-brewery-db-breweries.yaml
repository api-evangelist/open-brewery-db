naftiko: 1.0.0-alpha2
info:
  label: Open Brewery DB — Breweries
  description: 'Open Brewery DB — Breweries. 1 operations. Lead operation: Open Brewery DB List Breweries. Self-contained
    Naftiko capability covering one Open Brewery Db business surface.'
  tags:
  - Open Brewery Db
  - Breweries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_BREWERY_DB_API_KEY: OPEN_BREWERY_DB_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-brewery-db-breweries
    baseUri: https://api.openbrewerydb.org/v1
    description: Open Brewery DB — Breweries business capability. Self-contained, no shared references.
    resources:
    - name: breweries
      path: /breweries
      operations:
      - name: get
        method: GET
        description: Open Brewery DB List Breweries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: by_city
          in: query
          type: string
          description: Filter by city name.
        - name: by_state
          in: query
          type: string
          description: Filter by state name (no abbreviations).
        - name: by_country
          in: query
          type: string
          description: Filter by country name.
        - name: by_type
          in: query
          type: string
          description: Filter by brewery type.
        - name: by_postal
          in: query
          type: string
          description: Filter by postal code.
        - name: per_page
          in: query
          type: integer
          description: Number of breweries per page (default 50, max 200).
        - name: page
          in: query
          type: integer
          description: Page number for pagination.
  exposes:
  - type: rest
    namespace: open-brewery-db-breweries-rest
    port: 8080
    description: REST adapter for Open Brewery DB — Breweries. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/breweries
      name: breweries
      description: REST surface for breweries.
      operations:
      - method: GET
        name: get
        description: Open Brewery DB List Breweries
        call: open-brewery-db-breweries.get
        with:
          by_city: rest.by_city
          by_state: rest.by_state
          by_country: rest.by_country
          by_type: rest.by_type
          by_postal: rest.by_postal
          per_page: rest.per_page
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-brewery-db-breweries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Brewery DB — Breweries. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: open-brewery-db-list-breweries
      description: Open Brewery DB List Breweries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-brewery-db-breweries.get
      with:
        by_city: tools.by_city
        by_state: tools.by_state
        by_country: tools.by_country
        by_type: tools.by_type
        by_postal: tools.by_postal
        per_page: tools.per_page
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
