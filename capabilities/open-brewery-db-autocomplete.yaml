naftiko: 1.0.0-alpha2
info:
  label: Open Brewery DB — Autocomplete
  description: 'Open Brewery DB — Autocomplete. 1 operations. Lead operation: Open Brewery DB Autocomplete. Self-contained
    Naftiko capability covering one Open Brewery Db business surface.'
  tags:
  - Open Brewery Db
  - Autocomplete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_BREWERY_DB_API_KEY: OPEN_BREWERY_DB_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-brewery-db-autocomplete
    baseUri: https://api.openbrewerydb.org/v1
    description: Open Brewery DB — Autocomplete business capability. Self-contained, no shared references.
    resources:
    - name: breweries-autocomplete
      path: /breweries/autocomplete
      operations:
      - name: get
        method: GET
        description: Open Brewery DB Autocomplete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Search term.
  exposes:
  - type: rest
    namespace: open-brewery-db-autocomplete-rest
    port: 8080
    description: REST adapter for Open Brewery DB — Autocomplete. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/breweries/autocomplete
      name: breweries-autocomplete
      description: REST surface for breweries-autocomplete.
      operations:
      - method: GET
        name: get
        description: Open Brewery DB Autocomplete
        call: open-brewery-db-autocomplete.get
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-brewery-db-autocomplete-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Brewery DB — Autocomplete. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: open-brewery-db-autocomplete
      description: Open Brewery DB Autocomplete
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-brewery-db-autocomplete.get
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
